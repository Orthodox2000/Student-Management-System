# Student management schema for Pillai University assessment

type Student @table {
  id: UUID! @default(expr: "uuidV4()")
  admissionNumber: String! @col(dataType: "varchar(24)") @unique
  name: String! @col(dataType: "varchar(120)")
  course: String! @col(dataType: "varchar(120)")
  year: Int!
  dateOfBirth: Date!
  email: String! @col(dataType: "varchar(180)") @unique
  mobileNumber: String! @col(dataType: "varchar(20)")
  gender: String! @col(dataType: "varchar(20)")
  address: String!
  photoUrl: String
  ownerUid: String! @default(expr: "'system-admin'")
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}
